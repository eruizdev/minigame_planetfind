<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el Planeta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2.5rem; text-shadow: 0 0 20px rgba(100,150,255,0.5); }
        .container { max-width: 800px; margin: 0 auto; }
        button {
            display: block;
            margin: 0 auto 20px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #4a90d9 0%, #6b5bdf 100%);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .planet-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 10px;
        }
        .planet-name { font-size: 1.8rem; margin-bottom: 15px; color: #7eb8ff; }
        .planet-info { display: grid; gap: 10px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .info-label { color: rgba(255,255,255,0.7); }
        .info-value { font-weight: bold; }
        .msg { text-align: center; font-size: 1.2rem; margin: 16px 0; }
        .msg.error { color: #f87171; }
        .msg.ok { color: #34d399; }
        .intentos { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
        input[type="text"] {
            display: block;
            margin: 0 auto 16px;
            padding: 15px 25px;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            color: white;
            outline: none;
            width: 100%;
        }
        input::placeholder { color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🪐 Adivina el Planeta</h1>
        <button onclick="nuevaPartida()">Nuevo Planeta</button>

        <div id="juego" style="display:none;">
            <p class="intentos" id="intentos">Intentos: 0</p>
            <input type="text" id="guess" placeholder="Escribe el nombre del planeta..." onkeydown="if(event.key==='Enter') adivinar()">
            <div class="msg" id="msg"></div>
            <div id="resultado"></div>
        </div>
    </div>

    <script>
        const planetas = [
            { englishName: "Mercury", bodyType: "Planet", semimajorAxis: 57909050, sideralOrbit: 87.969, sideralRotation: 1407.6, mass: 3.301, density: 5.427, gravity: 3.7, avgTemp: 340, moons: [] },
            { englishName: "Venus",   bodyType: "Planet", semimajorAxis: 108208000, sideralOrbit: 224.701, sideralRotation: 5832.5, mass: 48.685, density: 5.243, gravity: 8.87, avgTemp: 737, moons: [] },
            { englishName: "Earth",   bodyType: "Planet", semimajorAxis: 149598023, sideralOrbit: 365.256, sideralRotation: 23.9, mass: 59.722, density: 5.514, gravity: 9.8, avgTemp: 288, moons: [1] },
            { englishName: "Mars",    bodyType: "Planet", semimajorAxis: 227936064, sideralOrbit: 686.971, sideralRotation: 24.6, mass: 6.4171, density: 3.933, gravity: 3.72, avgTemp: 210, moons: [1,2] },
            { englishName: "Jupiter", bodyType: "Planet", semimajorAxis: 778547200, sideralOrbit: 4332.589, sideralRotation: 9.9, mass: 18981.27, density: 1.326, gravity: 24.79, avgTemp: 165, moons: Array(95).fill(0) },
            { englishName: "Saturn",  bodyType: "Planet", semimajorAxis: 1433449370, sideralOrbit: 10759.22, sideralRotation: 10.7, mass: 5683.19, density: 0.687, gravity: 10.44, avgTemp: 134, moons: Array(146).fill(0) },
            { englishName: "Uranus",  bodyType: "Planet", semimajorAxis: 2876679082, sideralOrbit: 30688.5, sideralRotation: 17.2, mass: 868.1, density: 1.271, gravity: 8.87, avgTemp: 76, moons: Array(28).fill(0) },
            { englishName: "Neptune", bodyType: "Planet", semimajorAxis: 4503443661, sideralOrbit: 60182.0, sideralRotation: 16.1, mass: 1024.09, density: 1.638, gravity: 11.15, avgTemp: 72, moons: Array(16).fill(0) }
        ];

        let planetaSecreto = null;
        let intentos = 0;

        function nuevaPartida() {
            document.getElementById("juego").style.display = "none";
            document.getElementById("msg").textContent = "";
            document.getElementById("resultado").innerHTML = "";

            planetaSecreto = planetas[Math.floor(Math.random() * planetas.length)];
            intentos = 0;
            document.getElementById("intentos").textContent = "Intentos: 0";
            document.getElementById("guess").value = "";
            document.getElementById("guess").disabled = false;
            document.getElementById("juego").style.display = "block";
            document.getElementById("guess").focus();
        }

        function adivinar() {
            if (!planetaSecreto) return;
            const guess = document.getElementById("guess").value.trim().toLowerCase();
            if (!guess) return;

            intentos++;
            document.getElementById("intentos").textContent = "Intentos: " + intentos;

            const nombre = planetaSecreto.englishName.toLowerCase();

            if (nombre.includes(guess) || guess.includes(nombre)) {
                document.getElementById("msg").className = "msg ok";
                document.getElementById("msg").textContent = " Esa es mijito, si es " + planetaSecreto.englishName + " en " + intentos + " intento(s).";
                document.getElementById("guess").disabled = true;
                mostrarInfo();
            } else {
                document.getElementById("msg").className = "msg error";
                document.getElementById("msg").textContent = "No manito, siga jugando...";
                document.getElementById("guess").value = "";
            }
        }

        function mostrarInfo() {
            const p = planetaSecreto;
            document.getElementById("resultado").innerHTML = `
                <div class="planet-card">
                    <h2 class="planet-name">${p.englishName}</h2>
                    <div class="planet-info">
                        <div class="info-row"><span class="info-label">Tipo</span><span class="info-value">${p.bodyType}</span></div>
                        <div class="info-row"><span class="info-label">Eje Semi-Mayor</span><span class="info-value">${p.semimajorAxis.toLocaleString()} km</span></div>
                        <div class="info-row"><span class="info-label">Período Orbital</span><span class="info-value">${p.sideralOrbit} días</span></div>
                        <div class="info-row"><span class="info-label">Rotación Sideral</span><span class="info-value">${p.sideralRotation} horas</span></div>
                        <div class="info-row"><span class="info-label">Masa</span><span class="info-value">${p.mass} ×10²² kg</span></div>
                        <div class="info-row"><span class="info-label">Densidad</span><span class="info-value">${p.density} g/cm³</span></div>
                        <div class="info-row"><span class="info-label">Gravedad</span><span class="info-value">${p.gravity} m/s²</span></div>
                        <div class="info-row"><span class="info-label">Temperatura</span><span class="info-value">${p.avgTemp} K</span></div>
                        <div class="info-row"><span class="info-label">Lunas</span><span class="info-value">${p.moons.length}</span></div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
